  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; overflow: hidden; height: 100vh; position: relative; }
    #matrix-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; opacity: 0.15; }
    #game-container { position: relative; z-index: 1; height: 100vh; }
    #game-container::after { content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.1) 2px, rgba(0,0,0,0.1) 4px);
      pointer-events: none; z-index: 2; }
    #game-output::-webkit-scrollbar { width: 6px; }
    #game-output::-webkit-scrollbar-track { background: transparent; }
    #game-output::-webkit-scrollbar-thumb { background: #003300; border-radius: 3px; }
    #game-output::-webkit-scrollbar-thumb:hover { background: #005500; }
  </style>

<body>
  <canvas id="matrix-canvas"></canvas>
  <div id="game-container"></div>
  <script>
    const canvas = document.getElementById('matrix-canvas');
    const ctx = canvas.getContext('2d');
    function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    resizeCanvas(); window.addEventListener('resize', resizeCanvas);
    const matChars = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789';
    const fs = 14; let cols = Math.floor(canvas.width / fs); let drops = Array(cols).fill(1);
    function drawMatrix() {
      ctx.fillStyle = 'rgba(10, 10, 10, 0.05)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#00ff41'; ctx.font = fs + 'px monospace';
      for (let i = 0; i < drops.length; i++) {
        ctx.fillText(matChars[Math.floor(Math.random() * matChars.length)], i * fs, drops[i] * fs);
        if (drops[i] * fs > canvas.height && Math.random() > 0.975) drops[i] = 0;
        drops[i]++;
      }
    }
    setInterval(drawMatrix, 50);
    window.addEventListener('resize', () => { cols = Math.floor(canvas.width / fs); drops = Array(cols).fill(1); });
  </script>

      "name": "Jungle Clearing",
      "zone": "jungle",
      "description": "A rare break in the canopy lets sunlight pour into a small clearing. A massive banyan tree dominates the center, its aerial roots forming a cathedral of wood. Someone has hung wind chimes from the lower branches — they tinkle softly though you feel no breeze. A carved stone marker points north toward 'VILLAGE'.",
      "exits": { "southwest": "jungle_south", "north": "jungle_north", "east": "jungle_east", "west": "jungle_west" },
      "items": ["journal_3"]
    },
    "jungle_west": {
      "name": "Western Jungle Trail",
      "zone": "jungle",
      "description": "A winding trail through dense undergrowth. The vegetation here is so thick that you can barely see five feet in any direction. Strange orchids bloom in the shadows — deep purple with veins of luminescent blue. You hear running water somewhere to the west.",
      "exits": { "east": "jungle_central", "southeast": "jungle_south", "west": "jungle_waterfall", "north": "jungle_camp" },
      "items": []
    },
    "jungle_east": {
      "name": "Eastern Jungle",
      "zone": "jungle",
      "description": "The jungle thins slightly here, transitioning from dense tropical forest to something drier. You spot animal tracks in the mud — too large for anything you'd expect on an island this size. A faint smell of smoke drifts from somewhere to the north.",
      "exits": { "west": "jungle_central", "north": "village_outskirts", "south": "jungle_edge_east" },
      "items": []
    },
    "jungle_edge_east": {
      "name": "Jungle's Eastern Edge",
      "zone": "jungle",
      "description": "The jungle meets the coastline here in a tangle of roots and sand. Mangrove-like trees wade into the shallows on twisted stilts. The canopy is alive with the chatter of unseen birds. A faded trail leads deeper into the jungle.",
      "exits": { "south": "beach_cove", "north": "jungle_east", "west": "jungle_south" },
      "items": []
    },
    "jungle_edge_west": {
      "name": "Jungle's Western Edge",
      "zone": "jungle",
      "description": "Where the sand dunes meet the jungle, the vegetation grows in stubborn clumps, fighting for purchase in the sandy soil. A path leads east into the proper jungle. To the north, you can hear what sounds like a stream.",
      "exits": { "south": "beach_dunes", "east": "jungle_south", "north": "jungle_west" },
      "items": []
    },
    "jungle_waterfall": {
      "name": "Hidden Waterfall",
      "zone": "jungle",
      "description": "A beautiful waterfall cascades twenty feet down a mossy rock face into a clear pool. The mist keeps everything perpetually damp and glistening. Ferns the size of small trees crowd the banks. Behind the waterfall, if you look carefully, you can see the dark outline of a passage through the rock.",
      "exits": { "east": "jungle_west", "behind_waterfall": "jungle_hidden_path" },
      "items": []
    },
    "jungle_hidden_path": {
      "name": "Hidden Mountain Path",
      "zone": "jungle",
      "description": "Behind the waterfall, a narrow path climbs steeply upward through the rock. Carved stone markers — ancient, covered in lichen — line the way at regular intervals. The path is slippery but passable. It's clearly artificial, built by hands unknown long ago. This trail bypasses the marsh entirely.",
      "exits": { "out": "jungle_waterfall", "up": "mountain_trail_lower" },
      "items": []
    },
    "jungle_camp": {
      "name": "Jungle Camp",
      "zone": "jungle",
      "description": "A crude but effective campsite nestled between the buttress roots of an enormous tree. A lean-to shelter of palm fronds provides cover, and a fire pit ringed with stones holds smoldering coals. Drying racks hold strips of fish and fruit. This is clearly someone's home.",
      "exits": { "south": "jungle_west", "east": "jungle_north" },
      "items": ["dried_herbs"],
      "npc": "maya"
    },
    "jungle_north": {
      "name": "Northern Jungle",
      "zone": "jungle",
      "description": "The jungle grows darker and denser as you push north. The trees here are ancient — trunks wider than houses, bark scarred and gnarled. The ground is spongy with centuries of fallen leaves. Shafts of light pierce the canopy like spotlights on an empty stage. The village lies to the east, and the ground begins to slope upward to the north.",
      "exits": { "south": "jungle_central", "east": "village_outskirts", "north": "jungle_marsh_edge", "west": "jungle_camp" },
      "items": []
    },
    "jungle_marsh_edge": {
      "name": "Edge of the Marsh",
      "zone": "jungle",
      "description": "The firm ground of the jungle gives way to soft, sucking mud. The trees here are dead or dying, their bare branches reaching skyward like skeletal fingers. A pungent smell of sulfur and rotting vegetation hangs in the air. Strange pale lights flicker in the murk ahead. A crude sign reads: 'DANGER — DO NOT ENTER WITHOUT LIGHT'.",
      "exits": { "south": "jungle_north", "north": "marsh_entrance" },
      "requires": { "item": "lantern", "message": "The marsh ahead is pitch dark and treacherous. You'll need a light source before venturing in." },
      "items": []
    },
    "jungle_ruins_path": {
      "name": "Overgrown Path",
      "zone": "jungle",
      "description": "An ancient stone path, nearly consumed by the jungle, leads through an archway of intertwined branches. The stones are carved with worn symbols that match nothing in any language you know. The air feels different here — charged, electric, like before a storm.",
      "exits": { "south": "village_north", "north": "ruins_entrance" },
      "items": []
    },
    "village_outskirts": {
      "name": "Village Outskirts",
      "zone": "village",
      "description": "The jungle parts to reveal the remnants of a small fishing village. A dirt road runs north-south between a dozen or so wooden buildings in various states of disrepair. Fishing nets hang rotting on poles. A rusted bicycle leans against a wall. The village has the eerie stillness of a place abandoned in haste.",
      "exits": { "south": "jungle_east", "north": "village_square", "west": "jungle_north" },
      "items": []
    },
    "village_square": {
      "name": "Village Square",
      "zone": "village",
      "description": "The center of the village — a packed-earth square with a dry fountain at its center. The fountain depicts a sea creature of uncertain species, its mouth open in a frozen roar. Buildings surround the square: a general store to the east, a tavern to the west, and the road continues north and south.",
      "exits": { "south": "village_outskirts", "north": "village_north", "east": "village_store", "west": "village_tavern" },
      "items": []
    },
    "village_store": {
      "name": "General Store",
      "zone": "village",
      "description": "The door hangs open on one hinge. Inside, shelves are mostly bare, ransacked by time and weather. A few rusted cans remain, their labels long gone. The counter is thick with dust. Behind it, a locked door leads to a back room. The lock is rusty but solid.",
      "exits": { "west": "village_square", "back": "village_store_back" },
      "lockedExits": { "back": { "key": "rusty_key", "message": "The back door is secured with a heavy rusty lock." } },
      "items": []
    },
    "village_store_back": {
      "name": "Store Back Room",
      "zone": "village",
      "description": "A cramped storage room lined with shelves. Most are empty, but you find some useful supplies that were overlooked by whoever emptied this place. A coil of good rope hangs from a hook, and on a high shelf sits a copper antenna, still in its packaging.",
      "exits": { "front": "village_store" },
      "items": ["rope", "radio_antenna"]
    },
    "village_tavern": {
      "name": "The Salty Dog Tavern",
      "zone": "village",
      "description": "A small tavern with a hand-painted sign showing a dog in a sailor's cap. Inside, overturned chairs and broken glass speak of a hurried departure. The bar is intact, though the bottles behind it are empty. A faded map of the island hangs on the wall behind the bar, torn in half — the northern portion is missing. There's a trapdoor behind the bar.",
      "exits": { "east": "village_square", "down": "village_cellar" },
      "items": ["map_fragment_2"]
    },
    "village_cellar": {
      "name": "Tavern Cellar",
      "zone": "village",
      "description": "A damp, cool cellar beneath the tavern. Empty barrels line the walls. In one corner, someone has set up a cot and a small desk — a hidden living space. Papers are scattered on the desk, mostly weather-beaten and illegible. One page stands out, written in precise handwriting.",
      "exits": { "up": "village_tavern" },
      "items": ["journal_4"]
    },
    "village_north": {
      "name": "North Village Road",
      "zone": "village",
      "description": "The village road continues north, passing between the last of the buildings before giving way to jungle again. A small church stands to the west, its steeple crooked. To the east, a path leads to the village dock. An overgrown path leads north into the deep jungle toward ancient ruins.",
      "exits": { "south": "village_square", "west": "village_church", "east": "village_dock", "north": "jungle_ruins_path" },
      "items": []
    },
    "village_church": {
      "name": "Village Church",
      "zone": "village",
      "description": "A small wooden church, surprisingly intact. The pews are dusty but orderly. Stained glass windows, simple but beautiful, cast colored light across the floor. At the altar, fresh wildflowers sit in a jar — someone still comes here. A notice board near the door holds faded community announcements and a more recent hand-written note.",
      "exits": { "east": "village_north" },
      "items": ["old_photograph"]
    },
    "village_dock": {
      "name": "Village Dock",
      "zone": "village",
      "description": "A wooden dock extends into a small harbor. The planks are rotting in places — watch your step. Two boats are moored here: one capsized and barnacle-encrusted, the other merely decrepit. An old man sits at the dock's end, patiently mending a fishing net.",
      "exits": { "west": "village_north" },
      "items": [],
      "npc": "fisherman"
    },
    "village_shed": {
      "name": "Groundskeeper's Shed",
      "zone": "village",
      "description": "A small wooden shed behind the general store, its door hanging open. Garden tools rust on hooks along the walls: rakes, shovels, a wheelbarrow. On a workbench near the back, a machete sits in a leather sheath, apparently overlooked when the village was abandoned.",
      "exits": { "out": "village_outskirts" },
      "items": ["machete"]
    },
    "village_well": {
      "name": "Old Well",
      "zone": "village",
      "description": "A stone well stands in a small yard between buildings. A wooden bucket on a fraying rope hangs over the dark opening. The water below is still and black, but when you lean over the edge, you hear something — a faint hum, rhythmic and low, rising from deep underground.",
      "exits": { "south": "village_square" },
      "items": []
    },
    "research_approach": {
      "name": "Research Station Approach",
      "zone": "research",
      "description": "A gravel road, overrun with weeds, leads to a cluster of prefabricated buildings behind a chain-link fence. A faded sign reads 'MERIDIAN RESEARCH GROUP - GEOLOGICAL SURVEY STATION 7 - AUTHORIZED PERSONNEL ONLY'. The gate stands open, its lock cut long ago.",
      "exits": { "south": "village_north", "north": "research_courtyard" },
      "items": []
    },
    "research_courtyard": {
      "name": "Research Station Courtyard",
      "zone": "research",
      "description": "A central courtyard between four buildings. Cracked concrete underfoot, with weeds pushing through. A rusted flagpole stands bare. The buildings are labeled: LABORATORY (north), QUARTERS (east), STORAGE (west), and ADMINISTRATION (south-east). Emergency power cables snake between the buildings.",
      "exits": { "south": "research_approach", "north": "research_lab", "east": "research_quarters", "west": "research_storage", "southeast": "research_admin" },
      "items": []
    },
    "research_lab": {
      "name": "Main Laboratory",
      "zone": "research",
      "description": "A large open laboratory filled with equipment in various states of disrepair. Oscilloscopes, spectrometers, and instruments you can't identify crowd the benches. One workstation is still active — powered by a humming generator somewhere — its screen displaying endless scrolling data. A woman in a lab coat works frantically at this station.",
      "exits": { "south": "research_courtyard", "east": "research_lab_annex" },
      "items": [],
      "npc": "chen"
    },
    "research_lab_annex": {
      "name": "Laboratory Annex",
      "zone": "research",
      "description": "A smaller room adjoining the main lab, lined with glass-fronted cabinets. Most are empty or smashed, but one intact cabinet holds rows of delicate vacuum tubes, carefully labeled. The floor is covered in scattered papers — printouts of waveform analyses and frequency charts.",
      "exits": { "west": "research_lab" },
      "items": ["radio_tube", "journal_5"]
    },
    "research_quarters": {
      "name": "Researchers' Quarters",
      "zone": "research",
      "description": "A long prefab building divided into small dormitory rooms. Most doors stand open, revealing stripped beds and empty closets. The researchers clearly left in an orderly fashion — no personal effects remain. One room at the end of the hall has its door closed and locked.",
      "exits": { "west": "research_courtyard", "end": "research_voss_room" },
      "lockedExits": { "end": { "key": "brass_key", "message": "The door at the end of the hall is locked with a brass deadbolt." } },
      "items": []
    },
    "research_voss_room": {
      "name": "Dr. Voss's Room",
      "zone": "research",
      "description": "Elara Voss's private quarters. Unlike the others, this room is full of life — or was. Books overflow from shelves, star charts cover one wall, and a desk is buried under notebooks. The bed is neatly made, as if she expected to return. A framed photo shows a younger Voss smiling at the mouth of a cave. On the desk, a journal page is pinned under a crystal paperweight.",
      "exits": { "out": "research_quarters" },
      "items": ["journal_6"]
    },
    "research_storage": {
      "name": "Storage Building",
      "zone": "research",
      "description": "A warehouse-style building filled with crates and shelving units. Most supplies have been picked over, but there's still plenty of mundane equipment: tarps, PVC pipes, empty sample containers. A large workbench against the back wall holds heavier tools. Beneath the workbench, a heavy battery sits connected to a charging station — its indicator light glows green.",
      "exits": { "east": "research_courtyard" },
      "items": ["radio_battery", "crowbar"]
    },
    "research_admin": {
      "name": "Administration Building",
      "zone": "research",
      "description": "The administrative office of the research station. Filing cabinets line the walls, most drawers hanging open and empty. A large desk dominates the room, its surface clean except for a single folder marked 'CONTINGENCY PROTOCOL — DO NOT DISTRIBUTE'. The folder contains evacuation plans and... something else.",
      "exits": { "northwest": "research_courtyard" },
      "items": ["journal_7"]
    },
    "research_generator": {
      "name": "Generator Room",
      "zone": "research",
      "description": "A small concrete building housing two diesel generators. One is dead and rusted. The other chugs along faithfully, its fuel tank reading one-quarter full. It powers the single workstation in the lab. How long it's been running like this is anyone's guess.",
      "exits": { "south": "research_courtyard" },
      "items": []
    },
    "research_antenna": {
      "name": "Antenna Array",
      "zone": "research",
      "description": "Behind the research station, a field of antenna dishes and sensor equipment stretches across a cleared area. Most are inoperable, their cables cut or corroded. One large dish still points skyward, slowly rotating. It emits a low hum that makes your teeth ache. The ground beneath it is scorched black in a perfect circle.",
      "exits": { "south": "research_courtyard" },
      "items": []
    },
    "marsh_entrance": {
      "name": "Marsh Entrance",
      "zone": "marsh",
      "description": "The marsh swallows the firm ground entirely. Murky water stretches between hummocks of reedy grass. Dead trees stand like sentinels, their reflections doubling the sense of desolation. Your lantern pushes back the gloom but reveals unsettling things — bubbles rising from the muck, ripples with no visible source. A path of partially submerged stones leads deeper in.",
      "exits": { "south": "jungle_marsh_edge", "north": "marsh_deep" },
      "items": []
    },
    "marsh_deep": {
      "name": "Deep Marsh",
      "zone": "marsh",
      "description": "You're waist-deep in stagnant water. The stones underfoot are treacherous and the mud pulls at every step. Pale lights dance between the dead trees — not reflected lantern light, something else entirely. They move with purpose, circling you slowly. The whispers are louder here, almost intelligible.",
      "exits": { "south": "marsh_entrance", "east": "marsh_pools", "north": "marsh_crossing" },
      "items": []
    },
    "marsh_pools": {
      "name": "Sulfur Pools",
      "zone": "marsh",
      "description": "Bubbling pools of sulfurous water dot this area of the marsh, their edges crusted with yellow mineral deposits. The stench is overpowering. Steam rises in lazy columns, making everything hazy and unreal. In the center of the largest pool, barely visible through the steam, something glints.",
      "exits": { "west": "marsh_deep" },
      "items": ["stone_tablet"]
    },
    "marsh_crossing": {
      "name": "Marsh Crossing",
      "zone": "marsh",
      "description": "A makeshift bridge of lashed-together logs spans the worst of the marsh. It creaks ominously under your weight but holds. From here you can see the ground rising to the north — the edge of the mountain's foothills. The marsh thins to the northeast, where rocky ground begins to assert itself.",
      "exits": { "south": "marsh_deep", "north": "mountain_base", "northeast": "cave_entrance" },
      "items": []
    },
    "marsh_island": {
      "name": "Marsh Island",
      "zone": "marsh",
      "description": "A small rise of solid ground in the midst of the marsh, barely ten feet across. A single dead tree stands at its center. At the tree's base, tied to a root, is a waterproof bag. Someone left this here deliberately.",
      "exits": { "south": "marsh_deep" },
      "items": ["journal_8"]
    },
    "marsh_willows": {
      "name": "Weeping Willows",
      "zone": "marsh",
      "description": "A grove of ancient willows, their trailing branches creating curtains of green that brush the water's surface. It's almost peaceful here — the whispers seem muted, the lights distant. The willows form a natural shelter. Animal bones are scattered around the roots, picked clean.",
      "exits": { "east": "marsh_deep" },
      "items": []
    },
    "marsh_ruins": {
      "name": "Sunken Ruins",
      "zone": "marsh",
      "description": "Stone walls protrude from the marsh water at odd angles — the remains of a structure far older than the village. The stonework matches the carvings on the jungle path. Whatever this was — a watchtower? a gate? — it has been mostly claimed by the marsh. Carved symbols are still visible on one standing section of wall.",
      "exits": { "south": "marsh_crossing" },
      "items": []
    },
    "cave_entrance": {
      "name": "Cave Entrance",
      "zone": "caves",
      "description": "A wide opening in the rocky hillside, tall enough to walk through without ducking. Cool air flows outward, carrying the scent of wet stone and something metallic. The researchers installed guide ropes along the walls, though many have come loose. The darkness beyond your lantern's reach feels thick and watchful. The whispers are unmistakable here — a constant murmur just below understanding.",
      "exits": { "southwest": "marsh_crossing", "in": "cave_tunnel" },
      "items": []
    },
    "cave_tunnel": {
      "name": "Main Tunnel",
      "zone": "caves",
      "description": "A natural tunnel through limestone, smoothed by millennia of water flow. Stalactites hang from the ceiling like stone teeth. The guide ropes continue along the left wall. The tunnel branches — one path descends steeply to the right, another continues level to the left. Mineral deposits on the walls catch your lantern light, glittering like embedded stars.",
      "exits": { "out": "cave_entrance", "right": "cave_descent", "left": "cave_gallery" },
      "items": []
    },
    "cave_gallery": {
      "name": "Crystal Gallery",
      "zone": "caves",
      "description": "The tunnel opens into a breathtaking gallery. Massive crystal formations grow from floor and ceiling, some meeting in the middle like frozen columns of light. Your lantern refracts through them, casting rainbow patterns on every surface. The crystals hum — a pure, clear note that resonates in your chest. It's beautiful and deeply unsettling.",
      "exits": { "right": "cave_tunnel", "north": "cave_lake" },
      "items": []
    },
    "cave_descent": {
      "name": "Steep Descent",
      "zone": "caves",
      "description": "A precarious path descends at a sharp angle, with rough-hewn steps carved into the rock. A guide rope, frayed but intact, offers some security. The air grows warmer as you descend, and the whispers intensify. At the bottom, the passage levels out and continues into darkness.",
      "exits": { "up": "cave_tunnel", "down": "cave_chamber" },
      "items": []
    },
    "cave_chamber": {
      "name": "Resonance Chamber",
      "zone": "caves",
      "description": "An enormous natural cavern, its ceiling lost in darkness above. The walls are covered in the same unknown script seen on the stone markers. In the center of the chamber, on a raised stone platform, sits the artifact — a crystalline orb in a frame of dark metal, pulsing with inner light. The whispers emanate from it in waves. This is the source.",
      "exits": { "up": "cave_descent", "east": "cave_hermit" },
      "items": ["artifact"],
      "special": "The artifact hums intensely as you approach. The whispers become almost words — almost, but not quite. Taking the artifact feels significant, irreversible."
    },
    "cave_hermit": {
      "name": "Hermit's Alcove",
      "zone": "caves",
      "description": "A small side cave, made surprisingly comfortable. A fire burns in a ring of stones — how it has fuel or ventilation down here is a mystery. Dried herbs hang from crude hooks in the ceiling. Worn cushions surround the fire. A blind figure sits among them, perfectly still, as if waiting for you.",
      "exits": { "west": "cave_chamber" },
      "items": [],
      "npc": "hermit"
    },
    "cave_lake": {
      "name": "Underground Lake",
      "zone": "caves",
      "description": "The gallery opens onto the shore of a vast underground lake. The water is black and perfectly still, reflecting your lantern like a dark mirror. The far shore is invisible in the darkness. The crystal formations continue along the walls, providing a faint ambient glow. Something large moves beneath the surface — a shadow, there and gone.",
      "exits": { "south": "cave_gallery", "across": "cave_grotto" },
      "requires": { "item": "rope", "message": "The lake is too wide to swim safely, and something moves in the deep water. You need a way to cross — perhaps a rope to traverse along the crystal formations overhead." },
      "items": []
    },
    "cave_grotto": {
      "name": "Crystal Grotto",
      "zone": "caves",
      "description": "Beyond the lake, a small grotto blazes with crystal light. Every surface is encrusted with luminous crystals in shades of blue and violet. In the center, on a natural stone pedestal, sits a key made entirely of crystal, glowing with the same inner light as the artifact. The air here is warm and smells of ozone.",
      "exits": { "across": "cave_lake" },
      "items": ["crystal_key"]
    },
    "cave_passage_deep": {
      "name": "Deep Passage",
      "zone": "caves",
      "description": "A narrow passage that winds deeper into the earth. The walls press close, and you have to turn sideways in places. The stone is warm to the touch. Veins of crystal run through the rock like luminous arteries. The passage eventually connects to a vertical shaft with iron rungs hammered into the wall.",
      "exits": { "south": "cave_chamber", "up": "cave_shaft" },
      "items": []
    },
    "cave_shaft": {
      "name": "Vertical Shaft",
      "zone": "caves",
      "description": "A narrow vertical shaft with iron rungs set into the rock. Looking up, you can see distant daylight — this shaft connects the caves to the surface. The climb is long but the rungs are solid. The whispers echo strangely in the confined space, seeming to come from above and below simultaneously.",
      "exits": { "down": "cave_passage_deep", "up": "ruins_basement" },
      "items": []
    },
    "mountain_base": {
      "name": "Mountain Base",
      "zone": "mountain",
      "description": "The foothills of the island's central mountain rise before you, covered in scrubby vegetation that transitions to bare rock higher up. A rough trail switchbacks up the slope. To the south, the marsh spreads like a dark stain. The air is cleaner here, and you can see much of the island laid out below — jungle, village, the distant gleam of the sea.",
      "exits": { "south": "marsh_crossing", "up": "mountain_trail_lower" },
      "items": []
    },
    "mountain_trail_lower": {
      "name": "Lower Mountain Trail",
      "zone": "mountain",
      "description": "A rocky trail climbs through sparse trees and tough shrubs. The view expands with every switchback. You can see the research station's buildings to the southeast, and the lighthouse winking on the western headland. Loose scree makes the footing treacherous. Someone has placed cairns to mark the trail.",
      "exits": { "down": "mountain_base", "up": "mountain_trail_upper", "south": "jungle_hidden_path" },
      "items": []
    },
    "mountain_trail_upper": {
      "name": "Upper Mountain Trail",
      "zone": "mountain",
      "description": "Above the tree line now, the trail crosses bare rock and patches of hardy mountain grass. The wind is fierce up here, whipping at your clothes. The entire island is visible — a green jewel in an endless blue sea. No other land in sight. The trail continues up toward the summit and a ridge extends to the east.",
      "exits": { "down": "mountain_trail_lower", "up": "mountain_summit", "east": "mountain_ridge" },
      "items": []
    },
    "mountain_summit": {
      "name": "Mountain Summit",
      "zone": "mountain",
      "description": "The highest point on the island. A cairn of stacked stones marks the summit, with a weathered flag — the research team's banner — snapping in the wind. The view is staggering: the island entire, the reef that encircles it, the open ocean in every direction. On a clear day you might see the mainland, but today there's only haze. Carved into the summit rock is the symbol you've seen throughout the island — three concentric circles.",
      "exits": { "down": "mountain_trail_upper" },
      "items": ["journal_9"]
    },
    "mountain_ridge": {
      "name": "Eastern Ridge",
      "zone": "mountain",
      "description": "A narrow ridge extends east from the main peak, dropping steeply on both sides. The wind howls across the exposed rock. At the far end of the ridge, you can see stone structures — the temple ruins, built on a promontory overlooking the eastern sea. A precarious path leads to them.",
      "exits": { "west": "mountain_trail_upper", "east": "ruins_approach" },
      "items": []
    },
    "mountain_meadow": {
      "name": "Mountain Meadow",
      "zone": "mountain",

// The Whispering Isle — A Zork-like text adventure engine
// Game state is persisted to localStorage so the player resumes where they left off.

const SAVE_KEY = 'whisperingIsle_save';

// Island data is set by island-data-inline.js (loaded before this script) as window.ISLAND_DATA

class WhisperingIsle {
  constructor(container) {
    this.container = container;
    this.data = null;
    this.state = null;
    this.outputEl = null;
    this.inputEl = null;
    this.commandHistory = [];
    this.historyIndex = -1;
    this.init();
  }

  async init() {
    this.buildUI();
    await this.loadData();
    this.loadState();
    this.printTitle();
    this.look();
    this.inputEl.focus();
  }

  buildUI() {
    this.container.innerHTML = '';
    this.container.style.cssText = `
      background: transparent; color: #00ff41; font-family: 'Courier New', monospace;
      font-size: 14px; line-height: 1.6; height: 100vh; display: flex; flex-direction: column;
      padding: 0; margin: 0; overflow: hidden;
    `;

    this.outputEl = document.createElement('div');
    this.outputEl.id = 'game-output';
    this.outputEl.style.cssText = `
      flex: 1; overflow-y: auto; padding: 20px; white-space: pre-wrap; word-wrap: break-word;
    `;

    const inputRow = document.createElement('div');
    inputRow.style.cssText = `
      display: flex; align-items: center; padding: 10px 20px; border-top: 1px solid #003300;
      background: rgba(5, 5, 5, 0.7);
    `;

    const prompt = document.createElement('span');
    prompt.textContent = '> ';
    prompt.style.color = '#00ff41';

    this.inputEl = document.createElement('input');
    this.inputEl.type = 'text';
    this.inputEl.id = 'game-input';
    this.inputEl.autocomplete = 'off';
    this.inputEl.style.cssText = `
      flex: 1; background: transparent; border: none; outline: none;
      color: #00ff41; font-family: 'Courier New', monospace; font-size: 14px;
      caret-color: #00ff41;
    `;

    this.inputEl.addEventListener('keydown', (e) => this.handleKey(e));

    inputRow.appendChild(prompt);
    inputRow.appendChild(this.inputEl);
    this.container.appendChild(this.outputEl);
    this.container.appendChild(inputRow);
  }

  async loadData() {
    this.data = window.ISLAND_DATA;
  }

  loadState() {
    const saved = localStorage.getItem(SAVE_KEY);
    if (saved) {
      try {
        this.state = JSON.parse(saved);
        // Ensure state has all required fields (migration for older saves)
        this.state.flags = this.state.flags || {};
        this.state.journalCount = this.state.journalCount || 0;
        this.state.npcMet = this.state.npcMet || {};
        this.state.unlockedExits = this.state.unlockedExits || {};
        this.state.roomItems = this.state.roomItems || this.buildRoomItems();
        this.state.moves = this.state.moves || 0;
      } catch {
        this.state = null;
      }
    }
    if (!this.state) {
      this.state = this.newGame();
    }
  }

  newGame() {
    return {
      currentRoom: this.data.meta.startRoom,
      inventory: [],
      flags: {},
      journalCount: 0,
      npcMet: {},
      unlockedExits: {},
      roomItems: this.buildRoomItems(),
      moves: 0,
      visitedRooms: [this.data.meta.startRoom]
    };
  }

  buildRoomItems() {
    const ri = {};
    for (const [id, room] of Object.entries(this.data.rooms)) {
      ri[id] = [...(room.items || [])];
    }
    return ri;
  }

  save() {
    localStorage.setItem(SAVE_KEY, JSON.stringify(this.state));
  }

  // --- Output ---
  print(text, color) {
    const span = document.createElement('span');
    span.style.color = color || '#00ff41';
    span.textContent = text + '\n';
    this.outputEl.appendChild(span);
    this.outputEl.scrollTop = this.outputEl.scrollHeight;
  }

  printStyled(text, color) {
    const span = document.createElement('span');
    span.style.color = color || '#00ff41';
    span.style.fontStyle = 'italic';
    span.textContent = text + '\n';
    this.outputEl.appendChild(span);
    this.outputEl.scrollTop = this.outputEl.scrollHeight;
  }

  printTitle() {
    const art = `
╔══════════════════════════════════════════════════╗
║                                                  ║
║          T H E   W H I S P E R I N G             ║
║                   I S L E                        ║
║                                                  ║
║     A Text Adventure Mystery                     ║
║                                                  ║
║     Type 'help' for a list of commands.          ║
║                                                  ║
╚══════════════════════════════════════════════════╝
`;
    this.print(art, '#00ccff');
    if (this.state.moves > 0) {
      this.print(`[Restored save — Move ${this.state.moves}, ${this.state.visitedRooms.length} rooms visited]\n`, '#888');
    } else {
      this.printStyled('You awaken face-down in cold surf, coughing saltwater. Splintered wood and torn canvas float around you — the remnants of your vessel. A storm... you remember a storm, and then nothing. You drag yourself onto the rocks, shivering and disoriented. You are alive. But where are you?\n', '#cccccc');
    }
  }

  // --- Input ---
  handleKey(e) {
    if (e.key === 'Enter') {
      const cmd = this.inputEl.value.trim();
      if (cmd) {
        this.commandHistory.unshift(cmd);
        this.historyIndex = -1;
        this.print('\n> ' + cmd, '#888');
        this.processCommand(cmd);
        this.save();
      }
      this.inputEl.value = '';
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      if (this.historyIndex < this.commandHistory.length - 1) {
        this.historyIndex++;
        this.inputEl.value = this.commandHistory[this.historyIndex];
      }
    } else if (e.key === 'ArrowDown') {
      e.preventDefault();
      if (this.historyIndex > 0) {
        this.historyIndex--;
        this.inputEl.value = this.commandHistory[this.historyIndex];
      } else {
        this.historyIndex = -1;
        this.inputEl.value = '';
      }
    }
  }

  // --- Command Processing ---
  processCommand(raw) {
    const input = raw.toLowerCase().trim();
    const words = input.split(/\s+/);
    const verb = words[0];
    const rest = words.slice(1).join(' ');

    this.state.moves++;

    // Direction shortcuts
    const dirMap = {
      n: 'north', s: 'south', e: 'east', w: 'west',
      ne: 'northeast', nw: 'northwest', se: 'southeast', sw: 'southwest',
      u: 'up', d: 'down'
    };

    if (dirMap[verb]) return this.go(dirMap[verb]);

    // Movement
    if (['go', 'move', 'walk', 'run', 'head', 'travel', 'climb', 'enter', 'exit'].includes(verb)) {
      const dir = rest || '';
      return this.go(dirMap[dir] || dir);
    }

    // Look
    if (['look', 'l', 'examine', 'inspect', 'search'].includes(verb)) {
      if (!rest || rest === 'around' || rest === 'room') return this.look();
      return this.examine(rest);
    }

    // Inventory
    if (['inventory', 'i', 'inv'].includes(verb)) return this.showInventory();

    // Take / Get
    if (['take', 'get', 'grab', 'pick', 'collect'].includes(verb)) {
      const target = rest.replace(/^up\s+/, '').replace(/^the\s+/, '');
      return this.take(target);
    }

    // Drop
    if (['drop', 'leave', 'discard'].includes(verb)) {
      return this.drop(rest.replace(/^the\s+/, ''));
    }

    // Talk / Ask
    if (['talk', 'speak', 'ask', 'say', 'tell', 'chat', 'greet'].includes(verb)) {
      return this.talk(rest);
    }

    // Use / Place
    if (['use', 'place', 'put', 'insert', 'apply', 'give', 'show', 'repair', 'fix'].includes(verb)) {
      return this.use(rest);
    }

    // Read
    if (['read'].includes(verb)) {
      return this.read(rest);
    }

    // Open / Unlock
    if (['open', 'unlock'].includes(verb)) {
      return this.unlock(rest);
    }

    // Light
    if (['light', 'ignite'].includes(verb)) {
      return this.lightLantern();
    }

    // Map
    if (['map'].includes(verb)) return this.showMap();

    // Journal
    if (['journal', 'journals', 'pages', 'notes'].includes(verb)) return this.showJournal();

    // Help
    if (['help', 'commands', '?'].includes(verb)) return this.showHelp();

    // Save is automatic, but confirm
    if (['save'].includes(verb)) {
      this.save();
      return this.print('Game saved.', '#888');
    }

    // Restart
    if (['restart', 'reset', 'newgame'].includes(verb)) {
      return this.confirmRestart();
    }
    if (verb === 'yes' && this.state.flags.pendingRestart) {
      delete this.state.flags.pendingRestart;
      this.state = this.newGame();
      this.save();
      this.outputEl.innerHTML = '';
      this.printTitle();
      return this.look();
    }

    // Hint
    if (['hint', 'hints'].includes(verb)) return this.showHint();

    // Wait
    if (['wait', 'z'].includes(verb)) {
      return this.print('Time passes. The whispers continue their ceaseless murmur.', '#cccccc');
    }

    // Listen
    if (['listen'].includes(verb)) return this.listen();

    // Smell
    if (['smell', 'sniff'].includes(verb)) return this.smell();

    // Score
    if (['score', 'progress'].includes(verb)) return this.showScore();

    // Xyzzy
    if (['xyzzy', 'plugh'].includes(verb)) {
      return this.print('A hollow voice says "Fool."', '#ffcc00');
    }

    // Directions as full words
    const fullDirs = ['north', 'south', 'east', 'west', 'northeast', 'northwest',
      'southeast', 'southwest', 'up', 'down', 'in', 'out',
      'left', 'right', 'back', 'front', 'across',
      'behind_waterfall', 'tower', 'cottage', 'workshop', 'storage', 'end'];
    if (fullDirs.includes(verb)) return this.go(verb);

    this.print(`I don't understand "${raw}". Type 'help' for available commands.`, '#ff6666');
  }

  // --- Actions ---
  go(direction) {
    if (!direction) {
      return this.print('Go where? Specify a direction.', '#ffcc00');
    }

    const room = this.data.rooms[this.state.currentRoom];
    if (!room) return this.print('ERROR: Room not found.', '#ff0000');

    // Check locked exits
    if (room.lockedExits && room.lockedExits[direction]) {
      const lockKey = this.state.currentRoom + ':' + direction;
      if (!this.state.unlockedExits[lockKey]) {
        const lock = room.lockedExits[direction];
        if (this.state.inventory.includes(lock.key)) {
          this.state.unlockedExits[lockKey] = true;
          const keyItem = this.data.items[lock.key];
          this.print(`You use the ${keyItem.name} to unlock the way. It swings open with a groan.`, '#00ccff');
        } else {
          return this.print(lock.message, '#ffcc00');
        }
      }
    }

    const exits = room.exits || {};
    if (!exits[direction]) {
      return this.print('You can\'t go that way.', '#ffcc00');
    }

    const targetRoom = exits[direction];
    const target = this.data.rooms[targetRoom];

    // Check requires
    if (target && this.data.rooms[targetRoom].requires) {
      // Check the requirement on the SOURCE side (jungle_marsh_edge checks before entering marsh)
    }
    if (room.requires && direction === Object.keys(room.exits).find(k => room.exits[k] === targetRoom)) {
      // Nope — requirements are on the room you're entering
    }

    // Actually check target room requirements via the source room definition
    const sourceRoom = this.data.rooms[this.state.currentRoom];
    if (sourceRoom.requires && exits[direction]) {
      // The requires on marsh_edge blocks going north
      // Check: does the current room have a requires that blocks this exit?
    }

    // Check requires on the entry point
    if (this.data.rooms[targetRoom] && this.data.rooms[targetRoom].requires) {
      const req = this.data.rooms[targetRoom].requires;
      // Only block if coming from specific direction (check if source has the requires)
    }

    // Simpler: check requires on the room we're LEAVING if it has one
    if (room.requires && !this.state.flags['passed_' + this.state.currentRoom]) {
      const req = room.requires;
      if (!this.state.inventory.includes(req.item)) {
        return this.print(req.message, '#ffcc00');
      }
      this.state.flags['passed_' + this.state.currentRoom] = true;
    }

    // Check requires on target room
    if (target && target.requires && !this.state.flags['accessed_' + targetRoom]) {
      const req = target.requires;
      if (!this.state.inventory.includes(req.item)) {
        return this.print(req.message, '#ffcc00');
      }
      this.state.flags['accessed_' + targetRoom] = true;
    }

    this.state.currentRoom = targetRoom;
    if (!this.state.visitedRooms.includes(targetRoom)) {
      this.state.visitedRooms.push(targetRoom);
    }
    this.look();
  }

  look() {
    const room = this.data.rooms[this.state.currentRoom];
    if (!room) return this.print('You are nowhere. This is a bug.', '#ff0000');

    this.print(`\n—— ${room.name} ——`, '#00ccff');
    this.print(room.description, '#cccccc');

    if (room.special && typeof room.special === 'string' && room.special !== 'radio_repair_location' && room.special !== 'endgame_altar') {
      this.printStyled(room.special, '#ffcc00');
    }

    // Show items in room
    const roomItems = this.state.roomItems[this.state.currentRoom] || [];
    if (roomItems.length > 0) {
      const itemNames = roomItems.map(id => this.data.items[id]?.name || id);
      this.print('\nYou can see: ' + itemNames.join(', '), '#aaffaa');
    }

    // Show NPC
    if (room.npc) {
      const npc = this.data.npcs[room.npc];
      if (npc) {
        // Check visibility (ghost requires journal pages)
        if (npc.requiresJournalPages && this.state.journalCount < npc.requiresJournalPages) {
          // Ghost not visible yet
        } else {
          this.print('\n' + npc.description, '#ffcc88');
        }
      }
    }

    // Show exits
    const exits = Object.keys(room.exits || {});
    if (exits.length > 0) {
      const exitDisplay = exits.map(e => {
        const lockKey = this.state.currentRoom + ':' + e;
        if (room.lockedExits && room.lockedExits[e] && !this.state.unlockedExits[lockKey]) {
          return e + ' (locked)';
        }
        return e;
      });
      this.print('\nExits: ' + exitDisplay.join(', '), '#888');
    }
  }

  examine(target) {
    // Check inventory items
    for (const id of this.state.inventory) {
      const item = this.data.items[id];
      if (item && this.matchItem(target, item.name)) {
        return this.print(item.description, '#cccccc');
      }
    }
    // Check room items
    const roomItems = this.state.roomItems[this.state.currentRoom] || [];
    for (const id of roomItems) {
      const item = this.data.items[id];
      if (item && this.matchItem(target, item.name)) {
        return this.print(item.description, '#cccccc');
      }
    }
    // Check NPC
    const room = this.data.rooms[this.state.currentRoom];
    if (room.npc) {
      const npc = this.data.npcs[room.npc];
      if (npc && this.matchItem(target, npc.name)) {
        return this.print(npc.description, '#ffcc88');
      }
    }
    this.print(`You don't see "${target}" here.`, '#ffcc00');
  }

  matchItem(input, name) {
    const lower = name.toLowerCase();
    const words = input.toLowerCase().replace(/^the\s+/, '').split(/\s+/);
    // Exact match
    if (input.toLowerCase() === lower) return true;
    // Partial: any word in input matches any word in name
    const nameWords = lower.split(/\s+/);
    return words.some(w => nameWords.some(nw => nw.includes(w) || w.includes(nw)));
  }

  take(target) {
    if (!target) return this.print('Take what?', '#ffcc00');

    const roomItems = this.state.roomItems[this.state.currentRoom] || [];
    for (let i = 0; i < roomItems.length; i++) {
      const id = roomItems[i];
      const item = this.data.items[id];
      if (item && this.matchItem(target, item.name)) {
        if (item.portable === false) {
          return this.print(`You can't take the ${item.name}.`, '#ffcc00');
        }

        // Special case: artifact
        if (id === 'artifact') {
          this.print('You carefully lift the artifact from its pedestal. The whispers surge to a crescendo, then settle into a new pattern — as if acknowledging a change in custody. The chamber dims noticeably.', '#ff88ff');
        }

        roomItems.splice(i, 1);
        this.state.inventory.push(id);

        // Track journal pages
        if (item.type === 'journal') {
          this.state.journalCount = this.state.inventory.filter(
            iid => this.data.items[iid]?.type === 'journal'
          ).length;
          this.print(`Taken: ${item.name}`, '#aaffaa');
          this.print(`[Journal pages collected: ${this.state.journalCount}/10]`, '#888');
          return;
        }

        return this.print(`Taken: ${item.name}`, '#aaffaa');
      }
    }
    this.print(`You don't see "${target}" here to take.`, '#ffcc00');
  }

  drop(target) {
    if (!target) return this.print('Drop what?', '#ffcc00');

    for (let i = 0; i < this.state.inventory.length; i++) {
      const id = this.state.inventory[i];
      const item = this.data.items[id];
      if (item && this.matchItem(target, item.name)) {
        this.state.inventory.splice(i, 1);
        if (!this.state.roomItems[this.state.currentRoom]) {
          this.state.roomItems[this.state.currentRoom] = [];
        }
        this.state.roomItems[this.state.currentRoom].push(id);

        if (item.type === 'journal') {
          this.state.journalCount = this.state.inventory.filter(
            iid => this.data.items[iid]?.type === 'journal'
          ).length;
        }

        return this.print(`Dropped: ${item.name}`, '#aaffaa');
      }
    }
    this.print(`You're not carrying "${target}".`, '#ffcc00');
  }

  showInventory() {
    if (this.state.inventory.length === 0) {
      return this.print('You are empty-handed.', '#cccccc');
    }
    this.print('You are carrying:', '#00ccff');
    for (const id of this.state.inventory) {
      const item = this.data.items[id];
      this.print('  - ' + (item ? item.name : id), '#aaffaa');
    }
  }

  talk(target) {
    const room = this.data.rooms[this.state.currentRoom];
    if (!room.npc) {
      return this.print('There\'s no one here to talk to.', '#ffcc00');
    }

    const npc = this.data.npcs[room.npc];
    if (!npc) return this.print('There\'s no one here to talk to.', '#ffcc00');

    // Check ghost visibility
    if (npc.requiresJournalPages && this.state.journalCount < npc.requiresJournalPages) {
      return this.print('The sanctum is empty. Perhaps if you knew more of the story, you might see what others cannot...', '#888');
    }

    // Parse topic from input
    const words = target.toLowerCase().replace(/^to\s+/, '').replace(/^with\s+/, '').split(/\s+/);
    // Remove NPC name words to get topic
    const npcNameWords = npc.name.toLowerCase().split(/\s+/);
    const topicWords = words.filter(w => !npcNameWords.some(nw => nw === w));
    let topic = topicWords.join(' ').replace(/^about\s+/, '').replace(/^the\s+/, '').trim();

    // Mark as met
    if (!this.state.npcMet[room.npc]) {
      this.state.npcMet[room.npc] = true;
    }

    // Special trades
    if (room.npc === 'maya' && (topic === 'net' || topic === 'fishing net')) {
      if (this.state.inventory.includes('fishing_net')) {
        // Remove net from inventory
        this.state.inventory = this.state.inventory.filter(i => i !== 'fishing_net');
        this.state.flags.maya_trade = true;
        this.state.flags.waterfall_hint = true;
        return this.print(npc.dialogue.net, '#ffcc88');
      }
    }

    if (room.npc === 'briggs' && topic === 'key') {
      if (!this.state.flags.briggs_key) {
        this.state.flags.briggs_key = true;
        this.print(npc.dialogue.key, '#ffcc88');
        this.print('\n[Captain Briggs told you about the brass key at the top of the lighthouse.]', '#888');
        return;
      }
    }

    // Find matching dialogue
    if (topic && npc.dialogue[topic]) {
      return this.print(npc.dialogue[topic], '#ffcc88');
    }

    // Try partial match
    for (const [key, text] of Object.entries(npc.dialogue)) {
      if (key === 'default') continue;
      if (topic.includes(key) || key.includes(topic)) {
        return this.print(text, '#ffcc88');
      }
    }

    // Default dialogue
    this.print(npc.dialogue.default, '#ffcc88');
    const topics = Object.keys(npc.dialogue).filter(k => k !== 'default');
    this.print(`\n[You can ask about: ${topics.join(', ')}]`, '#888');
  }

  use(target) {
    if (!target) return this.print('Use what?', '#ffcc00');

    const room = this.data.rooms[this.state.currentRoom];

    // Radio repair
    if (this.state.currentRoom === 'lighthouse_workshop' &&
        (target.includes('radio') || target.includes('tube') || target.includes('antenna') || target.includes('battery') || target.includes('repair') || target.includes('fix'))) {
      return this.repairRadio();
    }

    // Temple altar / keys
    if (this.state.currentRoom === 'temple_sanctum' &&
        (target.includes('key') || target.includes('altar') || target.includes('place') || target.includes('silence'))) {
      return this.useAltar();
    }

    // Light lantern
    if (target.includes('lantern') || target.includes('light')) {
      return this.lightLantern();
    }

    // Show tablet to Chen
    if (this.state.currentRoom === 'research_lab' && target.includes('tablet')) {
      if (this.state.inventory.includes('stone_tablet')) {
        this.state.flags.chen_decoded = true;
        const npc = this.data.npcs.chen;
        return this.print(npc.dialogue.tablet, '#ffcc88');
      }
    }

    // Show tablet to Hermit
    if (this.state.currentRoom === 'cave_hermit' && target.includes('tablet')) {
      if (this.state.inventory.includes('stone_tablet')) {
        this.state.flags.hermit_tablet = true;
        return this.print('The Hermit runs their fingers over the tablet\'s surface, reading by touch. "Yes... this tells the true history. They came from between the stars, not as conquerors but as gardeners. They planted seeds of knowledge across many worlds. The artifact is one such seed — a way to call them back when the garden was ready. But we were not ready. We are still not ready."', '#ffcc88');
      }
    }

    // Burn herbs
    if (target.includes('herb')) {
      if (this.state.inventory.includes('dried_herbs')) {
        this.state.flags.herbs_burned = true;
        return this.print('You light the dried herbs. Fragrant smoke curls upward, and the whispers recede to a distant murmur. Your mind feels clearer.', '#aaffaa');
      }
    }

    // Flare gun
    if (target.includes('flare')) {
      if (this.state.inventory.includes('flare_gun')) {
        if (this.state.flags.radio_repaired) {
          this.state.flags.flare_fired = true;
          return this.print('You fire the flare gun skyward. A brilliant red star arcs across the sky, illuminating the island in crimson light. Combined with the radio signal, rescue is certain now.', '#ff4444');
        }
        return this.print('Firing the flare now would waste it. You should wait until you have a way to communicate with rescuers.', '#ffcc00');
      }
    }

    this.print(`You're not sure how to use that here.`, '#ffcc00');
  }

  repairRadio() {
    const hasAll = this.state.inventory.includes('radio_tube') &&
                   this.state.inventory.includes('radio_antenna') &&
                   this.state.inventory.includes('radio_battery');

    if (hasAll) {
      this.state.inventory = this.state.inventory.filter(
        i => !['radio_tube', 'radio_antenna', 'radio_battery'].includes(i)
      );
      this.state.flags.radio_repaired = true;

      this.print('You carefully install the vacuum tube, connect the copper antenna, and hook up the battery. Captain Briggs watches with growing excitement.', '#aaffaa');
      this.print('\nThe radio crackles... hisses... and then, gloriously, a carrier signal. Briggs grabs the microphone with shaking hands.', '#00ccff');
      this.print('\n"It works! By God, it works! I can reach the mainland!"', '#ffcc88');

      if (this.state.flags.temple_keys_solved) {
        this.print('\n' + this.data.endings.silence_and_escape.text, '#00ff88');
        this.print('\n*** CONGRATULATIONS — THE BEST ENDING ***', '#ffcc00');
      } else {
        this.print('\n' + this.data.endings.escape_only.text, '#ffcc88');
        this.print('\n*** ENDING ACHIEVED: ESCAPE (but the beacon still whispers...) ***', '#ffcc00');
        this.print('[Hint: You can still silence the beacon for the best ending. Place the three keys in the temple altar.]', '#888');
      }
      return;
    }

    const missing = [];
    if (!this.state.inventory.includes('radio_tube')) missing.push('vacuum tube');
    if (!this.state.inventory.includes('radio_antenna')) missing.push('copper antenna');
    if (!this.state.inventory.includes('radio_battery')) missing.push('heavy battery');

    this.print(`Captain Briggs examines what you have. "Not enough yet. I still need: ${missing.join(', ')}."`, '#ffcc88');
  }

  useAltar() {
    const hasAll = this.state.inventory.includes('rusty_key') &&
                   this.state.inventory.includes('brass_key') &&
                   this.state.inventory.includes('crystal_key');

    if (!hasAll) {
      const missing = [];
      if (!this.state.inventory.includes('rusty_key')) missing.push('a key for the wave symbol (sea)');
      if (!this.state.inventory.includes('crystal_key')) missing.push('a key for the mountain symbol (earth)');
      if (!this.state.inventory.includes('brass_key')) missing.push('a key for the star symbol (sky)');
      return this.print(`The altar has three keyholes. You still need: ${missing.join(', ')}.`, '#ffcc00');
    }

    this.state.inventory = this.state.inventory.filter(
      i => !['rusty_key', 'brass_key', 'crystal_key'].includes(i)
    );
    this.state.flags.temple_keys_solved = true;

    this.print('You place the rusty key in the wave lock. It turns with a grinding sound.', '#aaffaa');
    this.print('You place the crystal key in the mountain lock. It slides in smoothly, glowing brighter.', '#aaffaa');
    this.print('You place the brass key in the star lock. It clicks into place.', '#aaffaa');
    this.print('\nThe altar vibrates. The three-circle symbol blazes with light. A deep tone — felt more than heard — reverberates through the temple, through the mountain, through the entire island.', '#00ccff');
    this.print('\nAnd then... silence. True silence. The whispers that have been your constant companion since arriving on this island... stop.', '#ffffff');

    if (this.state.flags.radio_repaired) {
      this.print('\n' + this.data.endings.silence_and_escape.text, '#00ff88');
      this.print('\n*** CONGRATULATIONS — THE BEST ENDING ***', '#ffcc00');
    } else {
      this.print('\n' + this.data.endings.silence_only.text, '#ffcc88');
      this.print('\n*** ENDING ACHIEVED: SILENCE (but you\'re still stranded...) ***', '#ffcc00');
      this.print('[Hint: Repair the radio at the lighthouse to also escape the island for the best ending.]', '#888');
    }
  }

  lightLantern() {
    if (this.state.inventory.includes('lantern')) {
      this.state.flags.lantern_lit = true;
      return this.print('You light the oil lantern. A warm glow pushes back the darkness.', '#ffcc88');
    }
    this.print('You don\'t have anything to light.', '#ffcc00');
  }

  unlock(target) {
    const room = this.data.rooms[this.state.currentRoom];
    if (!room.lockedExits) {
      return this.print('There\'s nothing to unlock here.', '#ffcc00');
    }

    for (const [dir, lock] of Object.entries(room.lockedExits)) {
      const lockKey = this.state.currentRoom + ':' + dir;
      if (this.state.unlockedExits[lockKey]) continue;
      if (this.state.inventory.includes(lock.key)) {
        this.state.unlockedExits[lockKey] = true;
        const keyItem = this.data.items[lock.key];
        return this.print(`You use the ${keyItem.name} to unlock the way. Click! It opens.`, '#aaffaa');
      }
      return this.print(lock.message + ' You don\'t have the right key.', '#ffcc00');
    }
    this.print('There\'s nothing locked here (that you can see).', '#ffcc00');
  }

  read(target) {
    // Check inventory for readable items
    for (const id of this.state.inventory) {
      const item = this.data.items[id];
      if (item && this.matchItem(target, item.name)) {
        return this.print(item.description, '#cccccc');
      }
    }
    // Check room items
    const roomItems = this.state.roomItems[this.state.currentRoom] || [];
    for (const id of roomItems) {
      const item = this.data.items[id];
      if (item && this.matchItem(target, item.name)) {
        return this.print(item.description, '#cccccc');
      }
    }
    this.print('There\'s nothing like that to read.', '#ffcc00');
  }

  listen() {
    const room = this.data.rooms[this.state.currentRoom];
    const zone = room.zone;
    const msgs = {
      beach: 'Waves crash against the rocks. Sea birds cry overhead. Beneath it all, if you listen carefully... a faint murmur, like distant voices.',
      jungle: 'The jungle hums with insect song and bird calls. Wind rustles the canopy. And underneath — always underneath — the whispers. Formless. Persistent.',
      village: 'The village is unnervingly quiet. No voices, no footsteps. Just the creak of old wood and, faintly, the omnipresent whispers drifting from somewhere inland.',
      research: 'The hum of the generator provides a mechanical backdrop. Equipment clicks and whirs. The whispers here seem to pulse in time with the machines.',
      marsh: 'Water drips. Bubbles pop in the muck. The whispers are louder here — almost words, circling you like the pale lights.',
      caves: 'The whispers echo and multiply in the stone chambers. They layer on top of each other until they become almost a chord — eerie and beautiful.',
      mountain: 'Wind howls across the exposed rock. From below, the whispers rise like heat shimmer — distorted, stretched thin by the altitude.',
      lighthouse: 'The rhythmic sweep of the lighthouse mechanism. Waves against the rocks below. Gulls. The whispers are fainter here, as if the sea air dilutes them.',
      ruins: 'The whispers are loudest here. They seem to come from the very stones — urgent, insistent, and for the first time, almost comprehensible.'
    };
    this.print(msgs[zone] || 'You listen carefully. The whispers are always there, just at the edge of hearing.', '#cccccc');
  }

  smell() {
    const room = this.data.rooms[this.state.currentRoom];
    const zone = room.zone;
    const msgs = {
      beach: 'Salt, seaweed, and the clean tang of ocean air.',
      jungle: 'Rich earth, rotting vegetation, and the sweet perfume of tropical flowers.',
      village: 'Dust, old wood, and faintly, the ghost of cooking fires long cold.',
      research: 'Chemicals, machine oil, and the ozone tang of electrical equipment.',
      marsh: 'Sulfur, decay, and stagnant water. Unpleasant.',
      caves: 'Wet stone, mineral deposits, and something metallic — almost electric.',
      mountain: 'Clean air, rock dust, and the faint sweetness of mountain flowers.',
      lighthouse: 'Lamp oil, sea spray, and pipe tobacco.',
      ruins: 'Ancient stone, dust, and a strange scent — like ozone before a thunderstorm.'
    };
    this.print(msgs[zone] || 'Nothing remarkable.', '#cccccc');
  }

  showMap() {
    const maps = this.state.inventory.filter(id => this.data.items[id]?.type === 'map');
    if (maps.length === 0) {
      return this.print('You don\'t have a map. Perhaps you can find fragments of one somewhere.', '#ffcc00');
    }

    this.print('\n—— Island Map (assembled from fragments) ——', '#00ccff');

    if (maps.includes('map_fragment_3')) {
      this.print(`
       [Summit]
          |
    [Mountain/Cliffs]---[Temple Ruins]
          |
`, '#888');
    }
    if (maps.includes('map_fragment_2')) {
      this.print(`    [Marsh]---[Caves]
       |
  [Jungle]---[Village]---[Research Station]
       |         |
`, '#888');
    }
    if (maps.includes('map_fragment_1')) {
      this.print(`  [Lighthouse]
       |
  [Coast]---[Beach/Dunes]---[Cove]
                  |
            [Rocky Shore]---[Tidepools]
`, '#888');
    }

    this.print(`\nMap fragments found: ${maps.length}/3`, '#888');
    this.print(`Rooms visited: ${this.state.visitedRooms.length}`, '#888');
  }

  showJournal() {
    const journals = this.state.inventory
      .filter(id => this.data.items[id]?.type === 'journal')
      .sort((a, b) => (this.data.items[a].number || 0) - (this.data.items[b].number || 0));

    if (journals.length === 0) {
      return this.print('You haven\'t found any journal pages yet. Dr. Voss\'s journal was scattered across the island.', '#ffcc00');
    }

    this.print(`\n—— Dr. Voss's Journal [${journals.length}/10 pages] ——\n`, '#00ccff');
    for (const id of journals) {
      const item = this.data.items[id];
      this.print(item.description + '\n', '#cccccc');
    }
  }

  showScore() {
    const journalCount = this.state.inventory.filter(id => this.data.items[id]?.type === 'journal').length;
    const mapCount = this.state.inventory.filter(id => this.data.items[id]?.type === 'map').length;
    const npcsMetCount = Object.keys(this.state.npcMet).length;
    const totalNpcs = Object.keys(this.data.npcs).length;

    this.print('\n—— Progress ——', '#00ccff');
    this.print(`Moves: ${this.state.moves}`, '#cccccc');
    this.print(`Rooms explored: ${this.state.visitedRooms.length}/${Object.keys(this.data.rooms).length}`, '#cccccc');
    this.print(`Journal pages: ${journalCount}/10`, '#cccccc');
    this.print(`Map fragments: ${mapCount}/3`, '#cccccc');
    this.print(`NPCs met: ${npcsMetCount}/${totalNpcs}`, '#cccccc');
    this.print(`Radio repaired: ${this.state.flags.radio_repaired ? 'Yes' : 'No'}`, '#cccccc');
    this.print(`Beacon silenced: ${this.state.flags.temple_keys_solved ? 'Yes' : 'No'}`, '#cccccc');

    let score = journalCount * 5 + mapCount * 3 + npcsMetCount * 5 +
      this.state.visitedRooms.length +
      (this.state.flags.radio_repaired ? 20 : 0) +
      (this.state.flags.temple_keys_solved ? 20 : 0);
    this.print(`\nScore: ${score} points`, '#ffcc00');
  }

  showHint() {
    const hints = [];
    const inv = this.state.inventory;
    const flags = this.state.flags;

    if (inv.length === 0 && this.state.moves < 5) {
      hints.push('Look around and explore. Pick up items you find. Head north from the shore to reach the beach, then into the jungle.');
    }

    if (!inv.includes('lantern') && !flags.lantern_lit) {
      hints.push('You\'ll need a light source for dark areas. Check the sea cave east of the rocky shore.');
    }

    if (!inv.includes('rusty_key') && !flags.temple_keys_solved) {
      hints.push('One of the three keys is in the tidepools on the eastern beach.');
    }

    const journalCount = inv.filter(id => this.data.items[id]?.type === 'journal').length;
    if (journalCount < 3) {
      hints.push('Dr. Voss\'s journal pages are scattered across the island. Explore thoroughly — check every room.');
    }

    if (!Object.keys(this.state.npcMet).length) {
      hints.push('Find people to talk to. There\'s an old fisherman at the village dock.');
    }

    if (inv.includes('rusty_key') && !this.state.unlockedExits['village_store:back']) {
      hints.push('Your rusty key might open something in the village. Try the general store.');
    }

    if (!flags.radio_repaired) {
      if (!inv.includes('radio_tube')) hints.push('A vacuum tube can be found in the research station lab annex.');
      if (!inv.includes('radio_antenna')) hints.push('Copper antenna wire is in the village store\'s back room (locked).');
      if (!inv.includes('radio_battery')) hints.push('A charged battery is in the research station storage building.');
    }

    if (!flags.temple_keys_solved) {
      if (!inv.includes('brass_key')) hints.push('Talk to Captain Briggs at the lighthouse about a "key". Then check the lamp room at the top.');
      if (!inv.includes('crystal_key')) hints.push('The crystal key is in the Crystal Grotto, beyond the underground lake. You need rope to cross.');
    }

    if (flags.radio_repaired && !flags.temple_keys_solved) {
      hints.push('You escaped, but can you silence the beacon too? Find all three keys for the temple altar.');
    }

    if (flags.temple_keys_solved && !flags.radio_repaired) {
      hints.push('The beacon is silent, but you\'re still stranded. Repair the radio at the lighthouse.');
    }

    if (hints.length === 0) {
      hints.push('You seem to be doing well! Keep exploring and talking to everyone.');
    }

    this.print('\n—— Hint ——', '#ffcc00');
    this.print(hints[Math.floor(Math.random() * hints.length)], '#ffcc88');
  }

  showHelp() {
    this.print(`
—— Commands ——

MOVEMENT:    north/south/east/west (or n/s/e/w)
             up/down (or u/d), in/out
             go <direction>

ACTIONS:     look (l)          — describe current room
             examine <thing>   — look closely at something
             take <item>       — pick up an item
             drop <item>       — drop an item
             inventory (i)     — show what you're carrying
             use <item>        — use an item
             open/unlock       — try to open something
             light lantern     — light the oil lantern

INTERACTION: talk <person>              — start a conversation
             talk <person> about <topic> — ask about a topic
             give/show <item>           — give or show an item

SENSES:      listen             — listen to surroundings
             smell              — smell the air

INFO:        map                — view collected map fragments
             journal            — read collected journal pages
             score              — check your progress
             hint               — get a hint
             help               — show this help

SYSTEM:      save               — save game (also auto-saves)
             restart            — start a new game

Pro tip: Talk to NPCs about everything — try keywords like
'island', 'artifact', 'keys', 'voss', 'help', 'whispers'.
`, '#00ccff');
  }

  confirmRestart() {
    this.state.flags.pendingRestart = true;
    this.print('Are you sure you want to restart? All progress will be lost. Type "yes" to confirm.', '#ff6666');
  }
}

// Boot the game when loaded
function startWhisperingIsle(container) {
  return new WhisperingIsle(container || document.body);
}

    startWhisperingIsle(document.getElementById('game-container'));
  </script>
