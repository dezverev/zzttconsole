<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breakout</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .game-container {
            text-align: center;
        }
        h1 {
            color: #00d4ff;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #00d4ff;
        }
        canvas {
            border: 3px solid #00d4ff;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        }
        .info {
            color: #fff;
            margin-top: 15px;
            font-size: 18px;
        }
        .controls {
            color: #888;
            margin-top: 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>BREAKOUT</h1>
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div class="info">Score: <span id="score">0</span> | Lives: <span id="lives">3</span></div>
        <div class="controls">Use ← → arrow keys or mouse to move | Press SPACE to start</div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score');
        const livesDisplay = document.getElementById('lives');

        // Game state
        let score = 0;
        let lives = 3;
        let gameRunning = false;
        let gameOver = false;

        // Paddle
        const paddle = {
            width: 120,
            height: 15,
            x: canvas.width / 2 - 60,
            y: canvas.height - 30,
            speed: 8,
            dx: 0,
            color: '#00d4ff'
        };

        // Ball
        const ball = {
            radius: 8,
            x: canvas.width / 2,
            y: canvas.height - 50,
            speed: 6,
            dx: 4,
            dy: -4,
            color: '#ff6b9d'
        };

        // Bricks
        const brickConfig = {
            rows: 5,
            cols: 10,
            width: 70,
            height: 25,
            padding: 8,
            offsetTop: 60,
            offsetLeft: 25
        };

        const colors = ['#ff6b9d', '#feca57', '#48dbfb', '#1dd1a1', '#5f27cd'];
        let bricks = [];

        function initBricks() {
            bricks = [];
            for (let row = 0; row < brickConfig.rows; row++) {
                bricks[row] = [];
                for (let col = 0; col < brickConfig.cols; col++) {
                    bricks[row][col] = {
                        x: brickConfig.offsetLeft + col * (brickConfig.width + brickConfig.padding),
                        y: brickConfig.offsetTop + row * (brickConfig.height + brickConfig.padding),
                        status: 1,
                        color: colors[row]
                    };
                }
            }
        }

        function drawPaddle() {
            ctx.beginPath();
            ctx.roundRect(paddle.x, paddle.y, paddle.width, paddle.height, 8);
            ctx.fillStyle = paddle.color;
            ctx.fill();
            ctx.closePath();

            // Glow effect
            ctx.shadowBlur = 15;
            ctx.shadowColor = paddle.color;
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        function drawBall() {
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fillStyle = ball.color;
            ctx.fill();
            ctx.closePath();

            // Glow effect
            ctx.shadowBlur = 15;
            ctx.shadowColor = ball.color;
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        function drawBricks() {
            for (let row = 0; row < brickConfig.rows; row++) {
                for (let col = 0; col < brickConfig.cols; col++) {
                    const brick = bricks[row][col];
                    if (brick.status === 1) {
                        ctx.beginPath();
                        ctx.roundRect(brick.x, brick.y, brickConfig.width, brickConfig.height, 5);
                        ctx.fillStyle = brick.color;
                        ctx.fill();
                        ctx.closePath();

                        // Shine effect
                        ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                        ctx.fillRect(brick.x + 5, brick.y + 3, brickConfig.width - 10, brickConfig.height / 2);
                    }
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            drawBricks();
            drawPaddle();
            drawBall();

            if (gameOver) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.font = 'bold 48px Arial';
                ctx.fillStyle = '#ff6b9d';
                ctx.textAlign = 'center';
                ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 30);
                ctx.font = '24px Arial';
                ctx.fillStyle = '#fff';
                ctx.fillText('Press SPACE to restart', canvas.width / 2, canvas.height / 2 + 30);
            } else if (!gameRunning) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.font = 'bold 36px Arial';
                ctx.fillStyle = '#00d4ff';
                ctx.textAlign = 'center';
                ctx.fillText('Press SPACE to Start', canvas.width / 2, canvas.height / 2);
            }
        }

        function movePaddle() {
            paddle.x += paddle.dx;

            // Wall collision
            if (paddle.x < 0) paddle.x = 0;
            if (paddle.x + paddle.width > canvas.width) paddle.x = canvas.width - paddle.width;
        }

        function moveBall() {
            ball.x += ball.dx;
            ball.y += ball.dy;

            // Wall collision (left/right)
            if (ball.x + ball.radius > canvas.width || ball.x - ball.radius < 0) {
                ball.dx = -ball.dx;
            }

            // Wall collision (top)
            if (ball.y - ball.radius < 0) {
                ball.dy = -ball.dy;
            }

            // Paddle collision
            if (ball.y + ball.radius > paddle.y &&
                ball.x > paddle.x &&
                ball.x < paddle.x + paddle.width) {
                ball.dy = -Math.abs(ball.dy);
                
                // Add angle based on where it hits the paddle
                const hitPos = (ball.x - paddle.x) / paddle.width;
                ball.dx = 8 * (hitPos - 0.5);
            }

            // Brick collision
            for (let row = 0; row < brickConfig.rows; row++) {
                for (let col = 0; col < brickConfig.cols; col++) {
                    const brick = bricks[row][col];
                    if (brick.status === 1) {
                        if (ball.x > brick.x && ball.x < brick.x + brickConfig.width &&
                            ball.y > brick.y && ball.y < brick.y + brickConfig.height) {
                            ball.dy = -ball.dy;
                            brick.status = 0;
                            score += 10;
                            scoreDisplay.textContent = score;

                            // Check win condition
                            if (checkWin()) {
                                gameRunning = false;
                                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                                ctx.fillRect(0, 0, canvas.width, canvas.height);
                                ctx.font = 'bold 48px Arial';
                                ctx.fillStyle = '#1dd1a1';
                                ctx.textAlign = 'center';
                                ctx.fillText('YOU WIN!', canvas.width / 2, canvas.height / 2);
                                ctx.font = '24px Arial';
                                ctx.fillStyle = '#fff';
                                ctx.fillText('Press SPACE to play again', canvas.width / 2, canvas.height / 2 + 50);
                            }
                        }
                    }
                }
            }

            // Ball falls below paddle
            if (ball.y + ball.radius > canvas.height) {
                lives--;
                livesDisplay.textContent = lives;

                if (lives <= 0) {
                    gameOver = true;
                } else {
                    resetBall();
                }
            }
        }

        function checkWin() {
            for (let row = 0; row < brickConfig.rows; row++) {
                for (let col = 0; col < brickConfig.cols; col++) {
                    if (bricks[row][col].status === 1) return false;
                }
            }
            return true;
        }

        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height - 50;
            ball.dx = 4 * (Math.random() > 0.5 ? 1 : -1);
            ball.dy = -4;
        }

        function resetGame() {
            score = 0;
            lives = 3;
            gameOver = false;
            gameRunning = true;
            scoreDisplay.textContent = score;
            livesDisplay.textContent = lives;
            initBricks();
            resetBall();
        }

        function gameLoop() {
            if (gameRunning) {
                movePaddle();
                moveBall();
            }
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            if (e.code === 'ArrowLeft') {
                paddle.dx = -paddle.speed;
            } else if (e.code === 'ArrowRight') {
                paddle.dx = paddle.speed;
            } else if (e.code === 'Space') {
                e.preventDefault();
                if (!gameRunning || gameOver) {
                    resetGame();
                }
            }
        });

        document.addEventListener('keyup', (e) => {
            if (e.code === 'ArrowLeft' || e.code === 'ArrowRight') {
                paddle.dx = 0;
            }
        });

        // Mouse controls
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            paddle.x = mouseX - paddle.width / 2;

            if (paddle.x < 0) paddle.x = 0;
            if (paddle.x + paddle.width > canvas.width) paddle.x = canvas.width - paddle.width;
        });

        // Initialize and start
        initBricks();
        gameLoop();
    </script>
</body>
</html>
