<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix Rain Effect</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            overflow: hidden;
        }

        #matrixCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }
    </style>
</head>
<body>
    <canvas id="matrixCanvas"></canvas>

    <script>
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const matrixChars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*()*&^%';
        const fontSize = 16;
        let columns = Math.floor(canvas.width / fontSize);
        let drops = [];

        function initMatrixRain() {
            columns = Math.floor(canvas.width / fontSize);
            drops = [];
            for (let i = 0; i < columns; i++) {
                drops[i] = Math.random() * -100;
            }
        }

        function drawMatrixRain() {
            // Draw semi-transparent black to create fade effect
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#0f0';
            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < drops.length; i++) {
                // Random character
                const text = matrixChars.charAt(Math.floor(Math.random() * matrixChars.length));

                // Random speed for each column
                const speed = 10 + Math.random() * 15;

                // Update drop position
                drops[i] += speed / fontSize;

                // Randomly skip some characters to create gaps (about 10% chance)
                if (Math.random() > 0.9) {
                    drops[i] += Math.random() * 2;
                }

                // Draw the character
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                // Reset if off screen
                if (drops[i] > canvas.height / fontSize + 10) {
                    drops[i] = Math.random() * -50;
                }
            }
        }

        initMatrixRain();

        // Animation loop
        function matrixUpdate() {
            drawMatrixRain();
            requestAnimationFrame(matrixUpdate);
        }
        matrixUpdate();
    </script>
</body>
</html>
